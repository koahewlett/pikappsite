  <style>
    .gold-glimmer {
      animation: goldGlimmer 4.8s ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    @keyframes goldGlimmer {
      0%, 52%, 100% {
        opacity: 0;
        transform: translateX(-18px);
      }

      66% {
        opacity: 0.42;
        transform: translateX(12px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gold-glimmer {
        animation: none;
        opacity: 0.18;
        transform: none;
      }
    }
  </style>
